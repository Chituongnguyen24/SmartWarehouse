version: '3.8'

services:
  # ═══════════════════════════════════════════
  # PostgreSQL - Primary relational database
  # ═══════════════════════════════════════════
  postgres:
    image: postgres:15-alpine
    container_name: sfwms-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ═══════════════════════════════════════════
  # Redis - Cache, session, pub/sub
  # ═══════════════════════════════════════════
  redis:
    image: redis:7.0-alpine
    container_name: sfwms-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ═══════════════════════════════════════════
  # RabbitMQ - Message broker for event-driven
  # ═══════════════════════════════════════════
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: sfwms-rabbitmq
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "check_running"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ═══════════════════════════════════════════
  # Mosquitto - MQTT Broker for IoT sensors
  # ═══════════════════════════════════════════
  mosquitto:
    image: eclipse-mosquitto:2.0
    container_name: sfwms-mosquitto
    restart: always
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/config/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - mosquitto_data:/mosquitto/data

  # ═══════════════════════════════════════════
  # InfluxDB - Time-series DB for IoT data
  # ═══════════════════════════════════════════
  influxdb:
    image: influxdb:2.7-alpine
    container_name: sfwms-influxdb
    restart: always
    ports:
      - "8086:8086"
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: sfwms_influx_2026
      DOCKER_INFLUXDB_INIT_ORG: sfwms
      DOCKER_INFLUXDB_INIT_BUCKET: sensor_data
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: sfwms-influxdb-token-2026
    volumes:
      - influxdb_data:/var/lib/influxdb2

  # ═══════════════════════════════════════════
  # MinIO - Object storage for reports & models
  # ═══════════════════════════════════════════
  minio:
    image: minio/minio:latest
    container_name: sfwms-minio
    restart: always
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: sfwms_minio
      MINIO_ROOT_PASSWORD: sfwms_minio_2026
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  mosquitto_data:
  influxdb_data:
  minio_data:
